<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Monolith | Parallel Universe</title>
    <style>
        /* 1. RESET & BASE STYLING */
        body, html {
            margin: 0; padding: 0;
            background: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            height: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 2. ATMOSPHERIC LAYERS */
        .mist-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .blob {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(20,30,40,0.3) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; filter: blur(80px);
            animation: drift 25s infinite ease-in-out;
        }
        #blob2 { left: 40%; top: 20%; animation-duration: 35s; opacity: 0.5; }

        @keyframes drift {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(100px, -50px) scale(1.1); }
        }

        .grain {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Resolution_White_Noise_Video_Frame.png");
            opacity: 0.04; pointer-events: none; z-index: 10;
            animation: noise 0.2s infinite;
        }

        @keyframes noise {
            0% { transform: translate(0,0) }
            50% { transform: translate(-5%, 5%) }
            100% { transform: translate(5%, -5%) }
        }

        /* 3. MAIN MONOLITH SECTION */
        #universe {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 5;
        }

        #monolith {
            width: 60px; height: 280px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: float 8s ease-in-out infinite;
        }

        #monolith:hover {
            height: 320px;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(0.5deg); }
        }

        #instruction {
            position: absolute; bottom: 8%;
            font-size: 10px; letter-spacing: 5px;
            opacity: 0.3; text-transform: uppercase;
        }

        /* 4. ARCHIVE / GALLERY SECTION */
        #gallery {
            padding: 150px 10%;
            background: #050505;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 100px;
            z-index: 5;
            position: relative;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item-box {
            width: 100%; aspect-ratio: 16/9;
            background: #080808;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
