<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Monolith | Parallel Universe</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            height: 100%; width: 100%;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        /* ATMOSPHERIC LAYERS */
        .grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Resolution_White_Noise_Video_Frame.png");
            opacity: 0.03; pointer-events: none; z-index: 100;
        }

        /* MAIN SECTION */
        #universe {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; z-index: 10;
        }

        #monolith {
            width: 60px; height: 280px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #monolith:hover {
            height: 310px;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
        }

        #instruction {
            margin-top: 40px; font-size: 10px;
            letter-spacing: 5px; opacity: 0.5;
            text-align: center; text-transform: uppercase;
        }

        /* GALLERY SECTION */
        #gallery {
            padding: 150px 10%;
            background: #050505;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 80px; position: relative; z-index: 10;
        }

        .item { display: flex; flex-direction: column; align-items: center; }

        .item-box {
            width: 100%; aspect-ratio: 16/9;
            background: #080808; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 25px; position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .grid-overlay {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .schematic {
            width: 50px; height: 50px; border: 1px solid rgba(255,255,255,0.2);
            animation: rotate-geo 15s linear infinite;
        }

        @keyframes rotate-geo { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .item-links { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .artifact-link {
            font-size: 9px; letter-spacing: 1px; text-decoration: none;
            color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px; transition: 0.4s;
        }

        .artifact-link:hover { background: white; color: black; border-color: white; }
    </style>
</head>
<body>

    <div class="grain"></div>

    <section id="universe">
        <div id="monolith" onclick="activateUniverse()"></div>
        <div id="instruction">Touch Monolith to Synchronize</div>
    </section>

    <section id="gallery">
        <div class="item">
            <div class="item-box">
                <div class="grid-overlay"></div>
                <div class="schematic"></div>
            </div>
            <div class="item-links">
                <a href="https://ryuyabana.gumroad.com/" target="_blank" class="artifact-link">GUMROAD</a>
                <a href="https://yabanamusic.bandcamp.com/" target="_blank" class="artifact-link">BANDCAMP</a>
                <a href="https://www.youtube.com/@YabanaMusic" target="_blank" class="artifact-link">YOUTUBE</a>
            </div>
        </div>
        
        <div class="item">
            <div class="item-box">
                <div class="grid-overlay"></div>
                <div class="schematic" style="border-radius: 50%;"></div>
            </div>
            <div class="item-links">
                <a href="https://ryuyabana.gumroad.com/" target="_blank" class="artifact-link">GUMROAD</a>
                <a href="https://yabanamusic.bandcamp.com/" target="_blank" class="artifact-link">BANDCAMP</a>
                <a href="https://www.youtube.com/@YabanaMusic" target="_blank" class="artifact-link">YOUTUBE</a>
            </div>
        </div>
    </section>

    <script>
        let audioCtx, biquadFilter, isActive = false;

        function activateUniverse() {
            if (isActive) return;
            isActive = true;

            // 1. Setup Audio Engine
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "lowpass";
            biquadFilter.frequency.setValueAtTime(400, audioCtx.currentTime);

            const files = ['main-bgm-percs.mp3', 'main-bgm-pad-1.mp3', 'main-bgm-pad-2.mp3'];
            
            files.forEach(file => {
                const audio = new Audio(file);
                audio.loop = true;
                audio.crossOrigin = "anonymous"; // Prevents CORS issues
                
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(biquadFilter);
                biquadFilter.connect(audioCtx.destination);
                
                audio.play().catch(err => {
                    console.log("Audio load deferred:", file);
                });
            });

            document.getElementById('instruction').innerText = "Universe Active // Scroll to Discover";
            document.getElementById('monolith').style.background = "rgba(255,255,255,0.15)";
        }

        // 2. Mouse Move Filter Control
        document.addEventListener('mousemove', (e) => {
            if (!isActive || !biquadFilter) return;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const dist = Math.sqrt(Math.pow(e.clientX - centerX, 2) + Math.pow(e.clientY - centerY, 2));
            
            // Frequency opens (up to 15kHz) as you move closer to the center
            const freq = Math.max(400, 15000 - (dist * 20));
            biquadFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
        });
    </script>
</body>
</html>
