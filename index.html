<script>
let audioCtx, biquadFilter, isActive = false;

function startUniverse() {
    if (isActive) return;
    isActive = true;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    biquadFilter = audioCtx.createBiquadFilter();
    biquadFilter.type = "lowpass";
    biquadFilter.frequency.setValueAtTime(400, audioCtx.currentTime);

    const files = ['main-bgm-percs.mp3', 'main-bgm-pad-1.mp3', 'main-bgm-pad-2.mp3'];

    files.forEach(file => {
        const audio = new Audio(file);
        audio.loop = true;

        const source = audioCtx.createMediaElementSource(audio);
        source.connect(biquadFilter);
        biquadFilter.connect(audioCtx.destination);

        audio.play();
    });

    document.getElementById('instruction').innerText = "Universe Active // Move to shape sound";
    document.getElementById('identity').style.opacity = 0.6;
}

/* DESKTOP (mouse control) */
document.addEventListener('mousemove', (e) => {
    if (!isActive) return;

    const dist = Math.sqrt(
        Math.pow(e.clientX - window.innerWidth/2, 2) +
        Math.pow(e.clientY - window.innerHeight/2, 2)
    );

    const freq = Math.max(400, 20000 - (dist * 20));

    if (biquadFilter) {
        biquadFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
    }

    const artifacts = document.querySelectorAll('.artifact');
    let opacity = (dist - 150) / 400;

    artifacts.forEach(a => {
        a.style.opacity = Math.min(Math.max(opacity, 0), 0.7);
    });
});

/* MOBILE (touch control) */
document.addEventListener('touchmove', (e) => {
    if (!isActive) return;

    const touch = e.touches[0];

    const y = touch.clientY;
    const percent = y / window.innerHeight;

    const freq = 400 + (1 - percent) * 19600;

    if (biquadFilter) {
        biquadFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
    }

    const artifacts = document.querySelectorAll('.artifact');
    let opacity = (percent - 0.2) * 1.5;

    artifacts.forEach(a => {
        a.style.opacity = Math.min(Math.max(opacity, 0), 0.7);
    });
});
</script>
