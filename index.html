<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Monolith | Parallel Universe</title>
    <style>
        body {
            margin: 0;
            background: #050505; /* Deep Void */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
        }

        /* The Monolith */
        #monolith {
            width: 80px;
            height: 300px;
            background: linear-gradient(180deg, #111, #222);
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 2s ease;
            animation: float 6s ease-in-out infinite;
        }

        #monolith:hover {
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #instruction {
            position: absolute;
            bottom: 10%;
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="monolith" onclick="startUniverse()"></div>
    <div id="instruction">Touch the Monolith</div>

    <audio id="track1" loop src="synth.mp3"></audio>
    <audio id="track2" loop src="field.mp3"></audio>
    <audio id="track3" loop src="texture.mp3"></audio>

    <script>
        function startUniverse() {
            // Browsers block auto-playing audio, 
            // so we start them when the user clicks the Monolith.
            document.getElementById('track1').play();
            document.getElementById('track2').play();
            document.getElementById('track3').play();
            
            document.getElementById('instruction').innerText = "Universe Active";
            document.getElementById('monolith').style.height = "350px";
        }
    </script>
</body>
</html>
