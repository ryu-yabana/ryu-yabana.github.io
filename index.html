<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryu Yabana — Official Website</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        /* 1. Organic Visuals: The Mist */
        .mist-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .blob {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(20,30,40,0.3) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; filter: blur(80px);
            animation: drift 25s infinite ease-in-out;
        }
        #blob1 { left: -10%; top: 10%; }
        #blob2 { left: 40%; top: 20%; animation-duration: 35s; opacity: 0.5; }

        @keyframes drift {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(100px, -50px) scale(1.1); }
        }

        .grain {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Resolution_White_Noise_Video_Frame.png");
            opacity: 0.04; pointer-events: none; z-index: 10;
            animation: noise 0.2s infinite;
        }

        @keyframes noise {
            0% { transform: translate(0,0) }
            50% { transform: translate(-5%, 5%) }
            100% { transform: translate(5%, -5%) }
        }

        /* 2. Main Universe Section */
        #universe {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 5;
            <div id="identity">
    RYU YABANA<br>
    <span>Official Website</span>
</div>
        }

        #monolith {
            width: 60px; height: 280px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: float 8s ease-in-out infinite;
        }

        #monolith:hover { height: 320px; border-color: rgba(255,255,255,0.5); }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(0.5deg); }
        }

        .artifact {
            position: absolute; font-size: 9px; letter-spacing: 2px;
            text-decoration: none; color: rgba(255, 255, 255, 0.5);
            opacity: 0; transition: opacity 1.5s ease;
        }
        #art-yt { top: 20%; left: 20%; }
        #art-bc { bottom: 25%; left: 30%; }

        #instruction {
            position: absolute; bottom: 8%; font-size: 10px;
            letter-spacing: 5px; opacity: 0.3;
        }

        /* 3. Futuristic Organic Node Section */
        #node-section {
            padding: 200px 0;
            display: flex;
            justify-content: center;
            gap: 80px;
            z-index: 5;
            position: relative;
            background: transparent;
        }

        .pulse-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: 0.8s;
        }

        .circle-ring {
            width: 70px;
            height: 70px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .circle-ring::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            opacity: 0.2;
            box-shadow: 0 0 8px white;
        }

        .pulse-node:hover .circle-ring {
            width: 100px;
            height: 100px;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .node-label {
            margin-top: 25px;
            font-size: 10px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            transition: 0.6s;
        }

        .pulse-node:hover .node-label {
            color: white;
            letter-spacing: 7px;
        }

        @media (max-width: 768px) {
            #node-section { flex-direction: column; align-items: center; gap: 60px; }
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="mist-container">
        <div class="blob" id="blob1"></div>
        <div class="blob" id="blob2"></div>
    </div>
    
    <section id="universe">
        <div id="monolith" onclick="startUniverse()"></div>
        
        <a href="https://www.youtube.com/@YabanaMusic" target="_blank" class="artifact" id="art-yt">LOC // YT-01</a>
        <a href="https://yabanamusic.bandcamp.com/" target="_blank" class="artifact" id="art-bc">LOC // BC-02</a>

        <div id="instruction">Touch to Synchronize</div>
    </section>

    <section id="node-section">
        <a href="https://www.youtube.com/@YabanaMusic" target="_blank" class="pulse-node">
            <div class="circle-ring"></div>
            <span class="node-label">Youtube</span>
        </a>

        <a href="https://ryuyabana.gumroad.com/" target="_blank" class="pulse-node">
            <div class="circle-ring"></div>
            <span class="node-label">Gumroad</span>
        </a>

        <a href="https://yabanamusic.bandcamp.com/" target="_blank" class="pulse-node">
            <div class="circle-ring"></div>
            <span class="node-label">Bandcamp</span>
        </a>
    </section>

    <script>
        let audioCtx, biquadFilter, isActive = false;

        function startUniverse() {
            if (isActive) return;
            isActive = true;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "lowpass";
            biquadFilter.frequency.setValueAtTime(400, audioCtx.currentTime); 

            const files = ['main-bgm-percs.mp3', 'main-bgm-pad-1.mp3', 'main-bgm-pad-2.mp3'];
            
            files.forEach(file => {
                const audio = new Audio(file);
                audio.loop = true;
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(biquadFilter);
                biquadFilter.connect(audioCtx.destination);
                audio.play();
            });

            document.getElementById('instruction').innerText = "Universe Active // Scroll to Explore";
        }

        document.addEventListener('mousemove', (e) => {
            if (!isActive) return;

            const dist = Math.sqrt(Math.pow(e.clientX - window.innerWidth/2, 2) + Math.pow(e.clientY - window.innerHeight/2, 2));
            const freq = Math.max(400, 20000 - (dist * 20)); 
            if(biquadFilter) biquadFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);

            const artifacts = document.querySelectorAll('.artifact');
            let opacity = (dist - 150) / 400;
            artifacts.forEach(a => a.style.opacity = Math.min(Math.max(opacity, 0), 0.7));
        });
    </script>
</body>
</html>
