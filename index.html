<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Monolith | Parallel Universe</title>
    <style>
        body {
            margin: 0;
            background: #050505; /* Deep Void */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
        }

        /* The Monolith */
        #monolith {
            width: 80px;
            height: 300px;
            background: linear-gradient(180deg, #111, #222);
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 2s ease;
            animation: float 6s ease-in-out infinite;
        }

        #monolith:hover {
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #instruction {
            position: absolute;
            bottom: 10%;
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #0f1215 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }

        .grain {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Resolution_White_Noise_Video_Frame.png");
            opacity: 0.04; pointer-events: none; z-index: 10;
            animation: noise 0.2s infinite;
        }

        @keyframes noise {
            0% { transform: translate(0,0) }
            50% { transform: translate(-5%, 5%) }
            100% { transform: translate(5%, -5%) }
        }

        #monolith {
            width: 60px; height: 280px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; z-index: 5;
            transition: all 3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(0.5deg); }
        }

        /* The Coordinates (Artifacts) */
        .artifact {
            position: absolute;
            font-size: 9px;
            letter-spacing: 2px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0; /* Hidden by default */
            transition: opacity 1.5s ease, color 0.5s ease;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: drift 12s ease-in-out infinite;
        }

        .artifact:hover {
            color: rgba(255, 255, 255, 1);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .aura {
            width: 4px; height: 4px;
            background: white;
            border-radius: 50%;
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.8; }
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(10px, -15px); }
            66% { transform: translate(-10px, 10px); }
        }

        /* Specific positions for the 3 artifacts */
        #art-yt { top: 20%; left: 20%; }
        #art-gr { top: 40%; right: 15%; }
        #art-bc { bottom: 25%; left: 30%; }

        #instruction {
            position: absolute; bottom: 8%; font-size: 10px;
            letter-spacing: 5px; opacity: 0.3; text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    
    <div id="monolith" onclick="startUniverse()"></div>
    
    <a href="https://www.youtube.com/@YabanaMusic" target="_blank" class="artifact" id="art-yt">
        <div class="aura"></div>
        <span>LOC // 35.4785.YT</span>
    </a>

    <a href="https://ryuyabana.gumroad.com/" target="_blank" class="artifact" id="art-gr">
        <div class="aura"></div>
        <span>LOC // 139.6318.GR</span>
    </a>

    <a href="https://yabanamusic.bandcamp.com/" target="_blank" class="artifact" id="art-bc">
        <div class="aura"></div>
        <span>LOC // 02.19.2026.BC</span>
    </a>

    <div id="instruction">Establishing Connection</div>

    <audio id="track1" loop src="main-bgm-percs.mp3"></audio>
    <audio id="track2" loop src="main-bgm-pad-1.mp3"></audio>
    <audio id="track3" loop src="main-bgm-pad-2.mp3"></audio>

    <script>
        let isActive = false;

        function startUniverse() {
            if (isActive) return;
            isActive = true;

            const tracks = [
                document.getElementById('track1'),
                document.getElementById('track2'),
                document.getElementById('track3')
            ];
            
            tracks.forEach(t => {
                t.volume = 0;
                t.play();
                let vol = 0;
                const interval = setInterval(() => {
                    if (vol < 0.4) { vol += 0.01; t.volume = vol; }
                    else { clearInterval(interval); }
                }, 150);
            });

            document.getElementById('instruction').innerText = "Universe Synchronized";
        }

        // Logic for "Shadows": Fade in artifacts when mouse moves away from center
        document.addEventListener('mousemove', (e) => {
            if (!isActive) return;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // Calculate distance from center
            const distance = Math.sqrt(Math.pow(mouseX - centerX, 2) + Math.pow(mouseY - centerY, 2));
            
            // If distance is greater than 200px, start fading in the coordinates
            const artifacts = document.querySelectorAll('.artifact');
            let opacity = (distance - 150) / 400; // Adjust these numbers to change sensitivity
            if (opacity < 0) opacity = 0;
            if (opacity > 0.7) opacity = 0.7;

            artifacts.forEach(a => a.style.opacity = opacity);
        });
    </script>
</body>
